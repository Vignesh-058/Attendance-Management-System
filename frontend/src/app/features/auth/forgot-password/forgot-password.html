<div class="login-wrapper">
  <mat-card class="glass-panel login-card">
    <mat-card-header>
      <div class="header-content">
        <mat-icon class="logo-icon">lock_reset</mat-icon>
        <mat-card-title>Forgot Password</mat-card-title>
        <mat-card-subtitle>Enter your email to reset your password</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <div class="error-message" *ngIf="error">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error }}</span>
        </div>

        <div class="success-message" *ngIf="successMessage">
          <mat-icon>check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>
        <div class="mock-email-box" *ngIf="mockResetToken">
          <p><strong>[Mock Email Received]</strong></p>
          <p>Your One-Time Password (OTP) to reset your password is:</p>
          <h2 style="text-align: center; letter-spacing: 5px; color: #7b4dff;">{{ mockResetToken }}</h2>
        </div>

        <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="forgotForm.invalid || isLoading">
          <span *ngIf="!isLoading">Send Reset Link</span>
          <span *ngIf="isLoading" class="loader"></span>
        </button>

        <div class="footer-links">
          <a routerLink="/login">Back to Sign In</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
