<div class="login-wrapper">
  <mat-card class="glass-panel login-card">
    <mat-card-header>
      <div class="header-content">
        <mat-icon class="logo-icon">password</mat-icon>
        <mat-card-title>Set New Password</mat-card-title>
        <mat-card-subtitle>Please enter your new secure password</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>6-Digit OTP</mat-label>
          <input matInput type="text" formControlName="otp" maxlength="6">
          <mat-icon matSuffix>pin</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>New Password</mat-label>
          <input matInput type="password" formControlName="newPassword">
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>Confirm New Password</mat-label>
          <input matInput type="password" formControlName="confirmPassword">
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="resetForm.hasError('mismatch')">Passwords do not match</mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="error">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error }}</span>
        </div>

        <div class="success-message" *ngIf="successMessage">
          <mat-icon>check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>

        <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="resetForm.invalid || isLoading || !token">
          <span *ngIf="!isLoading">Reset Password</span>
          <span *ngIf="isLoading" class="loader"></span>
        </button>

        <div class="footer-links">
          <a routerLink="/login">Back to Sign In</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
