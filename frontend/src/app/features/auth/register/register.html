<div class="login-wrapper">
  <mat-card class="glass-panel login-card">
    <mat-card-header>
      <div class="header-content">
        <mat-icon class="logo-icon">person_add</mat-icon>
        <mat-card-title>Create an Account</mat-card-title>
        <mat-card-subtitle>Join the Attendance Portal</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div class="form-row">
          <mat-form-field appearance="outline" color="primary" class="half-width">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName">
          </mat-form-field>

          <mat-form-field appearance="outline" color="primary" class="half-width">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>Role</mat-label>
          <mat-select formControlName="role">
            <mat-option value="Student">Student</mat-option>
            <mat-option value="Teacher">Teacher</mat-option>
            <mat-option value="Admin">Admin</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" color="primary" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput type="password" formControlName="confirmPassword">
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="registerForm.hasError('mismatch')">Passwords do not match</mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="error">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error }}</span>
        </div>

        <div class="success-message" *ngIf="successMessage">
          <mat-icon>check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>

        <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="registerForm.invalid || isLoading">
          <span *ngIf="!isLoading">Sign Up</span>
          <span *ngIf="isLoading" class="loader"></span>
        </button>

        <div class="footer-links">
          <a routerLink="/login">Already have an account? Sign in</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
