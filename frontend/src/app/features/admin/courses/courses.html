<div class="admin-container">
      <h2>Manage Courses</h2>
      
      <mat-card class="form-card">
        <mat-card-content>
          <form (ngSubmit)="saveCourse()">
            <mat-form-field appearance="fill" class="full-width">
              <mat-label>Course Name</mat-label>
              <input matInput [(ngModel)]="currentCourse.name" name="name" required>
            </mat-form-field>
            
            <mat-form-field appearance="fill" class="full-width">
              <mat-label>Description</mat-label>
              <input matInput [(ngModel)]="currentCourse.description" name="description">
            </mat-form-field>

            <mat-form-field appearance="fill" class="full-width">
              <mat-label>Department</mat-label>
              <mat-select [(ngModel)]="currentCourse.departmentId" name="departmentId">
                <mat-option *ngFor="let dept of departments" [value]="dept.id">
                  {{dept.name}}
                </mat-option>
              </mat-select>
            </mat-form-field>

            <button mat-raised-button color="primary" type="submit">
              {{ isEditing ? 'Update' : 'Create' }} Course
            </button>
            <button mat-button type="button" *ngIf="isEditing" (click)="cancelEdit()">Cancel</button>
          </form>
        </mat-card-content>
      </mat-card>

      <table mat-table [dataSource]="courses" class="mat-elevation-z8">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef> Department </th>
          <td mat-cell *matCellDef="let element"> {{element.department?.name || 'N/A'}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" (click)="editCourse(element)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteCourse(element.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
