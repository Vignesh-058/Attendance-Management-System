<div class="attendance-container">
  <div class="header">
    <h1>Take Attendance</h1>
    <p>Mark attendance for your class session.</p>
  </div>

  <div class="message-banner" *ngIf="message" [class.success]="!message.includes('Error')" [class.error]="message.includes('Error')">
    {{ message }}
  </div>

  <mat-card class="glass-panel form-card">
    <mat-card-content>
      <form [formGroup]="attendanceForm" class="session-form">
        <mat-form-field appearance="outline">
          <mat-label>Subject</mat-label>
          <mat-select formControlName="subjectId">
            <mat-option *ngFor="let subject of subjects" [value]="subject.id">
              {{ subject.name }} ({{ subject.code }})
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date</mat-label>
          <input matInput type="date" formControlName="date">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Start Time</mat-label>
          <input matInput type="time" formControlName="startTime">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>End Time</mat-label>
          <input matInput type="time" formControlName="endTime">
        </mat-form-field>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="glass-panel table-card mt-4">
    <mat-card-header>
      <mat-card-title>Student Roster</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="students" class="history-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let element"> {{ element.firstName }} {{ element.lastName }} </td>
        </ng-container>

        <ng-container matColumnDef="rollNumber">
          <th mat-header-cell *matHeaderCellDef> Roll Number </th>
          <td mat-cell *matCellDef="let element"> {{ element.rollNumber }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let element">
            <mat-radio-group [(ngModel)]="element.status">
              <mat-radio-button value="Present">Present</mat-radio-button>
              <mat-radio-button value="Absent">Absent</mat-radio-button>
              <mat-radio-button value="Leave">Leave</mat-radio-button>
            </mat-radio-group>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div class="submit-actions mt-4 text-center">
        <button mat-raised-button color="primary" [disabled]="isLoading || attendanceForm.invalid || students.length === 0" (click)="submitAttendance()">
          <mat-icon>save</mat-icon> Submit Attendance
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
